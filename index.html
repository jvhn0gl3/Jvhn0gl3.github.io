<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Fundraiser Hub | My Campaigns</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
  <div class="header">
    <div class="badge">✨ my impact</div>
    <h1>My Fundraisers</h1>
    <div class="subhead">Track and manage your fundraising campaigns in one place.</div>
  </div>

  <div class="stats-row">
    <div class="stat-item"><span class="stat-label">Total campaigns:</span> <span id="totalCampaignsCount" class="stat-number">0</span></div>
    <div class="stat-item"><span class="stat-label">Total raised:</span> <span id="totalRaisedSum" class="stat-number">$0</span></div>
  </div>

  <div id="fundraisersGrid" class="fundraiser-grid"></div>

  <div id="emptyMessage" class="empty-state" style="display: none;">
    <p>🌟 No fundraisers yet — start your first campaign and inspire generosity.</p>
  </div>
</div>

<div id="fundraiserModal" class="modal">
  <div class="modal-content">
    <h2 id="modalTitle">✏️ Edit fundraiser</h2>
    <form id="fundraiserForm">
      <div class="form-group">
        <label>Campaign title *</label>
        <input type="text" id="campaignTitle" required placeholder="e.g., Clean Water Initiative">
      </div>
      <div class="form-group">
        <label>Category</label>
        <select id="campaignCategory">
          <option value="Community">Community</option>
          <option value="Medical">Medical</option>
          <option value="Education">Education</option>
          <option value="Environment">Environment</option>
          <option value="Emergency">Emergency</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Short description</label>
        <textarea id="campaignDesc" rows="2" placeholder="Brief story behind the cause..."></textarea>
      </div>
      <div class="form-group">
        <label>Goal amount ($)</label>
        <input type="number" id="campaignGoal" min="1" step="1" value="5000" required>
      </div>
      <div class="form-group">
        <label>Raised so far ($)</label>
        <input type="number" id="campaignRaised" min="0" step="1" value="0">
      </div>
      <div class="form-group">
        <label>Fundraiser link (URL)</label>
        <input type="url" id="campaignLink" placeholder="https://example.com/donate">
      </div>
      <div class="form-group">
        <label>Image URL (optional)</label>
        <input type="text" id="campaignImage" placeholder="/cohesive.jpg or https://...">
      </div>
      <input type="hidden" id="editId" value="">
      <div class="modal-buttons">
        <button type="button" id="closeModalBtn" class="btn-secondary">Cancel</button>
        <button type="submit" class="btn-primary">Save changes</button>
      </div>
    </form>
  </div>
</div>

<footer>
  ❤️ Every campaign matters — share & support with kindness.
</footer>

<script src="script.js"></script>
</body>
</html>
